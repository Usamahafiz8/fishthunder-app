name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Trigger Deploy via Webhook
    runs-on: ubuntu-latest

    steps:
      - name: Ping deploy webhook
        run: |
          PAYLOAD='{"ref":"refs/heads/main","pusher":{"name":"github-actions"}}'
          SIG=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | sed 's/.*= //')
          curl -f -s -X POST http://${{ secrets.SERVER_HOST }}:9000/deploy \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: sha256=$SIG" \
            -d "$PAYLOAD" \
            && echo "Deploy triggered successfully" \
            || echo "Webhook ping failed (server may be unreachable)"
